name: CI-CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./front
        run: npm install
      - name: Build frontend
        working-directory: ./front
        run: npm run build
      - name: Check build output
        working-directory: ./front
        run: ls -la .next

  build-back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./restoptim
        run: mvn package -DskipTests

  docker:
    runs-on: ubuntu-latest
    needs: [build-front, build-back]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push front
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile.prod
          push: true
          tags: ghcr.io/albin5223/restoptim-front:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://restoptim.albin-paris.fr
      - name: Build and push back
        uses: docker/build-push-action@v5
        with:
          context: ./restoptim
          file: ./restoptim/Dockerfile.prod
          push: true
          tags: ghcr.io/albin5223/restoptim-back:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/restoptim
            sudo rm data/*.db
            docker compose pull
            docker compose up -d