app:
  cors:
    allowed-origins: "http://localhost:3000,https://restoptim.albin-paris.fr"

spring:
  application:
    name: restoptim
  datasource:
    url: jdbc:sqlite:./data/restoptim.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: PRAGMA foreign_keys=ON
  sql:
    init:
      schema-locations:
        - classpath:schema-sqlite.sql
        - classpath:data-sqlite.sql
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

logging:
  level:
    fr.ultime.restoptim: DEBUG
    org.springframework.web: INFO
